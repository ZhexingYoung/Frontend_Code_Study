<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!-- 音频板块 -->
  <h2>音频`板块</h2>
  <audio src="Media/ldh.mp3" controls muted autoplay loop></audio>
  <!-- 音频兼容性写法 -->
  <audio>
    <source src="Media/ldh.mp3" type="audio/mp3" controls muted autoplay loop>
    <p>您的浏览器不支持 audio 标签。</p>
  </audio>


  <!-- 视频板块 -->
  <h2>视频格式</h2>
  <video src="Media/yu7.mp4" width="800" controls loop></video>
  <video src="Media/yu7.mp4" poster="Media/yu7.jpg" width="300" controls autoplay muted></video>

  <!--视频兼容性写法 -->
  <video poster="Media/yu7.jpg" width="600" controls loop>
    <source src="Media/yu7.mp4" type="video/mp4">
    <p>您的浏览器不支持 video 标签。</p>
  </video>


</body>

</html>
