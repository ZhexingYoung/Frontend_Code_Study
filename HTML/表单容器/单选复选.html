<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h2>单选复选</h2>
  <form action="">
    <ul>
      <li>
        账号：<input type="textarea" placeholder="请输入账户" name="username" maxlength="8" accesskey="u" autocomplete="off">
      </li>
      <li>
        密码：<input type="password" placeholder="请输入密码" name="password" maxlength="8" accesskey="p" autocomplete="off">
      </li>
      <li>
        <input type="radio" name="gender" value="1" checked>男
        <!-- checked的作用是添加默认选中,name是单选框的名称,value是单选框的值 -->
      </li>
      <li>
        <input type="radio" name="gender" value="0">女
      </li>
    </ul>
  </form>
  <br>

  <h2>复选复选框板块</h2>

  <form action="">
    <ul>
      <li>
        <input type="checkbox" name="hobby" value="1" checked>足球
      </li>
      <li>
        <input type="checkbox" name="hobby" value="2">篮球
      </li>
      <li>
        <input type="checkbox" name="hobby" value="3" checked> 乒乓球
      </li>
    </ul>
  </form>
  <br>


</body>

</html>
