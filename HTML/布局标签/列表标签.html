<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!-- 无序列表 UL全称unordered list -->
  <ul>
    <li>猪爸爸</li>
    <li>猪妈妈</li>
    <li>猪儿子</li>
    <li>猪女儿</li>
    <li>猪孙子
      <ul>
        <li>猪孙子1</li>
        <li>猪孙女2</li>
      </ul>
    </li>
  </ul>

  <!-- 有序列表 OL全称ordered list -->
  <ol>
    <li>猪爸爸</li>
    <li>猪妈妈</li>
    <li>猪儿子</li>
    <li>猪女儿</li>
    <li>猪孙子
      <ol>
        <li>猪孙子1</li>
        <li>猪孙女2</li>
      </ol>
    </li>
  </ol>

  <!-- 定义列表 DL全称definition list__':
 -->
  <dl>
    <dt>家电</dt>
    <!-- DT全称definition term -->
    <dd>冰箱</dd>
    <dd>洗衣机</dd>
    <dd>电视</dd>
    <dd>空调</dd>
    <!-- DD全称definition description -->
    <dt>3C产品</dt>
    <dd>手机</dd>
    <dd>平板</dd>
    <dd>耳机</dd>
    <dd>音箱</dd>

    <dt>百货</dt>
    <dd>超市</dd>
    <dd>超市</dd>
    <dd>超市</dd>
    <!-- DT和DD是成对出现的，区别是DT是定义项，DD是定义描述，每个DT后面跟着一个DD，每个DD后面跟着一个DT -->
    <!-- Dt可以有多个DD。DD可以加图片，也可以加其他标签 -->
  </dl>

</body>

</html>
