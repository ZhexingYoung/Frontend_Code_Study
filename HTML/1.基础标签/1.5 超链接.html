<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

〈<style>
  html {
    scroll-behavior: smooth;
  }
</style>
<!-- 这里设置的是网页的样式，用于设置网页的样式，以及在浏览器中显示。，这里的scroll-behavior: smooth;用于设置网页的滚动行为，使其平滑滚动，一般在css文件中设置，这里在head标签中设置。 -->

<body>
  <!-- 超链接板块 -->
  <!-- 1.内部链接 -->
  <!-- href属性是超链接的链接地址，用于设置超链接的链接地址。 -->
  <!-- title属性是超链接的标题，用于设置超链接的标题，以及在鼠标悬停时显示。 -->
  <!-- target属性是超链接的打开方式，用于设置超链接的打开方式，_self表示在当前窗口打开，_blank表示在新窗口打开。 -->
  <a href="./1.3.图片标签和路径.html" title="点击跳转图片标签" target="_self">内部链接</a>

  <!-- 2.外部链接 -->
  <!-- 外部链接是指链接到其他网站的超链接，用于在页面中创建一个目标，以便其他链接或脚本可以跳转到该位置。 -->
  <a href="https://www.deepseek.com/" title="点击跳转deepseek" target="_blank"> 外部链接</a>

  <!-- 3.空链接 -->
  <!-- 空链接是指没有链接地址的超链接，用于在页面中创建一个目标，以便其他链接或脚本可以跳转到该位置。 -->
  <a href="#锚点链接">产品介绍</a>

  <!-- 4.下载链接 -->
  <!-- 下载链接是指链接到其他文件的超链接，用于在页面中创建一个目标，以便其他链接或脚本可以跳转到该位置。 -->
  <a href="./猪爸爸.png" download target="_blank">下载链接</a>

  <!-- 5.邮件链接 -->
  <!-- 邮件链接是指链接到其他邮箱的超链接，用于在页面中创建一个目标，以便其他链接或脚本可以跳转到该位置，写法是mailto:邮箱地址。 -->
  <a href="mailto:123@qq.com">联系我们</a>

  <!-- 锚点链接 -->
  <!-- 锚点链接是指链接到页面中指定位置的超链接，用于在页面中创建一个目标，以便其他链接或脚本可以跳转到该位置。写法是id="锚点链接"。 -->
  <h2 id=“锚点链接”>锚点链接</h2>




</body>

</html>
