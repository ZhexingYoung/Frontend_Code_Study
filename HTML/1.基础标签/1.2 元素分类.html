<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h1>我是块级元素</h1>
  <hr>
  <h2>我是块级元素</h2>
  <p>
    <strong><ins>我是内联元素</ins></strong>
  </p>
  <!-- p标签是段落标签 块级元素 -->
  <!-- 块级元素和内联元素的区别是块级元素会独占一行，行内元素不会独占一行，以及块级元素可以设置宽高，行内元素不可以设置宽高，以及块级元素可以包含行内元素，行内元素不可以包含块级元素。 -->
<!-- 内联元素也叫行内元素，行内元素不会独占一行，可以设置宽高，可以包含行内元素，不可以包含块级元素。 -->


</body>

</html>
