<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!-- 表单容器 -->
  <!-- 表单容器的作用是包含所有的包单控件. -->
  <h2>表单容器</h2>
  <form action="">
    <!-- form的意思是表单，action的作用是添加表单的提交地址，method是表单的提交方式，get是默认方式，post是提交方式 -->
    <!-- method的作用是添加表单的提交方式，get是默认方式，post是提交方式 -->
    <ol>
      <li>
        <input type="textarea" placeholder="请输入账户" name="username" maxlength="10" accesskey="u" autocomplete="off">
        <!-- type=textarea的作用是添加文本框，name是文本框的名称，maxlength是文本框的最大长度，accesskey是文本框的快捷键，autocomplete是文本框的自动完成 -->
      <li>
        <input type="password" placeholder="请输入密码" name="password" maxlength="10" accesskey="p" autocomplete="off">
        <!-- accesskey的作用是添加密码框的快捷键,需要在浏览器中按下alt+p才能输入，mac	os上需要按下ctrl+p+option -->
        <button>登陆</button>
        <!-- button的作用是添加按钮，用于提交表单,type=submit是默认方式，type=reset是重置方式，type=button是普通按钮 -->
    </ol>

  </form>






</body>

</html>
