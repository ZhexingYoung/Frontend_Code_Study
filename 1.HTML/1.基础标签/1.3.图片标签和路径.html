<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h2>我是图片元素</h2>
  <img src="猪爸爸.png" alt="正在加载中。。。" width="300" height="150" title="猪爸爸">
  <!-- Src全称source，用于设置图片的源，可以是本地路径，也可以是网络路径。 -->
  <!-- Alt全称alternative，用于设置图片的替代文本，用于在图片无法显示时显示。 -->
  <!-- title属性是图片的标题，用于在图片无法显示时显示，并且鼠标悬停时显示。 -->
  <!-- width属性是图片的宽度，用于设置图片的宽度。 -->
  <!-- height属性是图片的高度，用于设置图片的高度。 -->
  <!-- 一般情况宽度和高度一般修改一个就可以了 因为图片的比例是固定的 同时修改会导致图片变形__':
-->
  <h2>插入不同格式的图片</h2>
  <img src="image/1.jpg" alt="正在加载中。。。">
  <img src="image/2.png" alt="正在加载中。。。">
  <img src="image/3.gif" alt="正在加载中。。。">
  <img src="image/4.bmp" alt="正在加载中。。。">
  <img src="image/5.tiff" alt="正在加载中。。。">
  <img src="image/6.webp" alt="正在加载中。。。">
  <img src="image/7.svg" alt="正在加载中。。。">
  <img src="image/8.ico" alt="正在加载中。。。">

  <!-- 文件路径 -->
  <!-- 相对路径：相对于当前文件的目录，使用./表示当前目录，使用../表示上级目录。 -->
  <h2>相对路径</h2>
  <img src="image/9.webp" alt="同一当前目录下的image文件夹">
  <img src="./猪爸爸.png" alt="同一当前目录">
  <img src="../猪爸爸.png" alt="返回上级目录">

  <!-- 绝对路径：从盘符开始的路径，使用E:/表示盘符，使用https://表示网络路径。 -->
  <h2>绝对路径</h2>
  <img src="E:/trae_projects/猪爸爸.png" alt="盘符路径">
  <img src="https://www.baidu.com/" alt="网络路径">

  <h3>我来试试看</h3>
  <h4>百度图片</h4>
  <hr>
  <img src="https://www.baidu.com/img/PCtm_d9c8750bed0b3c7d089fa7d55720d6cf.png" alt="百度图片" width="300" height="150">
  <hr>

</body>

</html>
