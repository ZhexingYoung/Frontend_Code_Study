<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS伪类选择</title>
  <style>
    /* 伪类选择器：用于选择元素的某种状态 */
    /* 链接伪类选择器：用于选择链接的某种状态 */
    /* 未访问状态：a:link */
    a:link {
      color: black;
      text-decoration: none;
    }

    /* 访问状态：a:visited */
    a:visited {
      color: orange;
    }

    /* 悬停状态：a:hover */
    a:hover {
      color: green;
      text-decoration: underline;
    }

    /* 激活状态：a:active */
    a:active {
      color: blue;
    }
  </style>
</head>

<body>
  <a href="https://www.baidu.com">百度</a>
  <a href="#">产品介绍</a>
  <a href="#">联系方式</a>
  <a href="https://www.deepseek.com">关于我们</a>

</body>

</html>
