<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS样式表分类</title>
  <style>
    div {
      color: blue;
    }
    strong {
      color: purple;
    }
  </style>
</head>

<body>
  <!-- 1.内联样式表（行内样式表）直接写在标签内部，控制当前标签的样式 -->
<P style="color: pink;">我是佩奇，我喜欢粉色</P>

<!-- 2.内部样式表（嵌入样式表）写在head里的<style>标签内部，控制当前页面所有标签的样式 -->
  <div>我是乔治，我喜欢蓝色</div>
  <strong>我是乔治，我喜欢紫色</strong>

<!-- 3.外部样式表（链接样式表）写在单独的css文件中，控制当前页面所有标签的样式 -->

</body>

</html>
