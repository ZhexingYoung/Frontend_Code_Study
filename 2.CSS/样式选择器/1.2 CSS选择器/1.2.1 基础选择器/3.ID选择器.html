<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ID选择器</title>
  <!-- ID选择器：通过ID名来选择元素 -->
  <!-- ID名必须以字母开头，可以包含字母、数字、连字符-，不能包含空格 -->
  <!-- ID名必须唯一，不能重复 -->
  <!-- ID名可以用于多个元素，不能用于多个标签 -->
  <style>
    #red {
      color: red;
    }
    #blue {
      color: blue;
      font-size: 20px;
    }
    #green {
      color: green;
    }
    #yellow {
      color: yellow;
    }
    </style>

  </head>


  <body>
    <div id="red">大春哥</div>
    <div id="blue">二春哥</div>
    <div id="green">三春哥</div>
    <div id="yellow">四春哥</div>
    <div id="purple">五春哥</div>
  </body>

  
</html>
