<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS分类选择器</title>
  <style>
    /* 分类选择器：用逗号隔开，可以同时选择多个元素  */
    .box,
    .box2 {
      width: 100px;
      height: 100px;
      background-color: pink;
    }
  </style>
</head>

<body>
  <div class="box">
    <p>我是文字</p>
    <p>我是文字</p>
  </div>
  <div class="box2">
    <p>我是文字</p>
    <p>我是文字</p>
  </div>
</body>

</html>
