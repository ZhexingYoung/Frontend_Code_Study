<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS权重优先级</title>
  <style>
    * {
      color: blue !important;
    }

    div {
      color: green;
    }

    .div {
      color: yellow;
    }

    #div {
      color: purple;
    }
  </style>
</head>

<body>
  <div class="div" id="div">我是div</div>
</body>

</html>
