<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通配符选择器</title>
  <!-- 通配符选择器：通过*来选择所有元素 -->
  <!-- *选择器可以用于选择所有元素，包括所有标签、类、ID等 -->
  <!-- *选择器可以用于选择所有元素，包括所有标签、类、ID等 -->
  <style>
    * {
      color: red;
      margin: 0 auto;
      /* 外边距 */
      text-align: center;
      /* 文本对齐 */
      font-size: 20px;
      /* 字体大小 */
      font-weight: bold;
      /* 字体粗细 */
      font-style: italic;
      /* 字体风格 */
      font-family: 'Arial', sans-serif;
      /* 字体族 */
      font-variant: small-caps;
      /* 字体变体 */
      font-stretch: expanded;
      /* 字体拉伸 */
      font-kerning: normal;
      /* 字体间距 */
    }
  </style>
</head>

<body>
  <div>大春哥</div>
  <div>二春哥</div>
  <div>三春哥</div>
  <div>四春哥</div>
  <div>五春哥</div>
  <div>六春哥</div>
  <div>七春哥</div>
  <div>八春哥</div>
  <div>九春哥</div>
</body>

</html>
