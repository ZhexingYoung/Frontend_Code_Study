<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <h1>这是个一级标题</h1>
  <hr>
  <header> 网页头部标签 </header>
  <!-- header标签是网页头部标签，用于设置网页的头部，包含标题、导航栏、搜索栏等。 -->
  <nav> 导航栏标签 </nav>
  <!-- nav标签是导航栏标签，用于设置网页的导航栏，包含链接、按钮等。 -->
  <main> 主要内容标签
    <!-- main标签是主要内容标签，用于设置网页的主要内容，包含文章、图片、视频等，并且具有唯一性，只能有一个main标签 且要放在body标签中。 -->
    <aside> 侧边栏标签 </aside>
    <!-- aside标签是侧边栏标签，用于设置网页的侧边栏，包含链接、按钮等，并且具有唯一性，只能有一个aside标签 且要放在body标签中。 -->
    <article> 文章标签 </article>
    <!-- article标签是文章标签，用于设置网页的文章，包含标题、内容、图片、视频等，并且具有唯一性，只能有一个article标签 且要放在body标签中。 -->
  </main>

  <footer> 页脚标签 </footer>
  <!-- footer标签是页脚标签，用于设置网页的页脚，包含版权、联系方式、友情链接等。 -->
  <section> 章节标签 </section>
  <!-- section标签是章节标签，用于设置网页的章节，包含标题、内容、图片、视频等，并且具有唯一性，只能有一个section标签 且要放在body标签中。 -->

  <div>我是div标签是块级元素</div>
  <div>我是div标签是块级元素</div>
  <!-- div标签是块级元素，用于设置网页的块级元素，包含标题、内容、图片、视频等。 -->

  <span>我是span标签行内元素</span>
  <span>我是span标签行内元素</span>
  <!-- span标签是行内元素，用于设置网页的行内元素，包含标题、内容、图片、视频等。 -->

</body>

</html>
