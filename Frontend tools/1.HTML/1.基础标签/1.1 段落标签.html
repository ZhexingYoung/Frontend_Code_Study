<!DOCTYPE html>
<!-- 这里设置的是文档类型，用于设置网页的文档类型，以及在浏览器中显示。 -->
<html lang="en">
    <!-- 这里设置的是语言，用于设置网页的语言，以及在浏览器中显示。 -->

<head>
    <meta charset="UTF-8">
    <!-- 这里设置的是字符集，用于设置网页的字符集，以及在浏览器中显示。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <!-- 这里设置的是视口，用于设置网页的宽度，初始缩放比例，以及是否允许用户缩放网页。 -->
    <title>我的第一个页面</title>
    <!-- 这里设置的是网页的标题，用于设置网页的标题，以及在浏览器标签中显示。 -->
</head>

<body>
    <div>
        <h1>这是个一级标题</h1>
        <!-- h1是标题标签 块级元素 -->
        <hr>
        <!-- hr是水平线标签 单标签 -->
        <h2>第二个标题</h2> 
        <!-- h2 是标题标签 块级元素 -->

        <!-- 语义化强调标签：strong、ins、del、em -->
        加粗：<strong>
            加粗文本
        </strong>
        <!-- strong是加粗标签 单标签 -->
        下划线：<ins>下划线文本 </ins>
        <!-- ins是下划线标签 单标签 -->
        删除线：<del>删除线文本</del>
        <!-- del是删除线标签 单标签 -->
        斜体：<em>
            斜体文本
        </em>
        <!-- em是斜体标签 单标签 -->
        <hr>
        <h2>第三个标题</h2>

        <hr>
    </div>
</body>

</html> 

<!-- 元素分类 -->
<!-- 标签语义化：标签的语义化是指标签的含义和用途，比如h1标签是标题标签，p标签是段落标签，img标签是图片标签，a标签是超链接标签，等等。 -->
 <!-- HTML主要分为head标签和body标签 -->
 <!-- head标签是头部标签，包含标题、meta、link、style、script等标签 -->
 <!-- body标签是主体标签，包含所有可见内容 -->
 <!-- 标题标签：h1-h6 -->
 <!-- 段落标签：p -->
 <!-- 列表标签：ul、ol、dl -->
 <!-- 表格标签：table -->
 <!-- 表单标签：form -->
 <!-- 图片标签：img -->
 <!-- 超链接标签：a -->
 <!-- 音频标签：audio -->
 <!-- 视频标签：video -->

 <!-- 标签主要分为块级元素和行内元素，他们的区别是块级元素会独占一行，行内元素不会独占一行，以及块级元素可以设置宽高，行内元素不可以设置宽高，以及块级元素可以包含行内元素，行内元素不可以包含块级元素。 -->
 <!-- 块级元素：h1-h6、p、div、ul、ol、dl、table、form、img、a、audio、video -->
 <!-- 行内元素：strong、ins、del、em、a、img、audio、video -->
 <!-- 行内块级元素：input、textarea、button、select、option -->
 <!-- 行内元素：strong、ins、del、em、a、img、audio、video -->
